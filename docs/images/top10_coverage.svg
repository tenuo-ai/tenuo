<text x="80" y="92" text-anchor="middle" class="small" fill="#a7f3d0">Prevented</text>
<rect x="136" y="76" width="92" height="24" rx="12" fill="#102b40" stroke="#38bdf8"/>
<text x="182" y="92" text-anchor="middle" class="small" fill="#bae6fd">Contained</text>
<rect x="238" y="76" width="92" height="24" rx="12" fill="#3f2b12" stroke="#f59e0b"/>
<text x="284" y="92" text-anchor="middle" class="small" fill="#fde68a">Partial</text>
<rect x="30" y="112" width="620" height="34" rx="8" class="card"/>
