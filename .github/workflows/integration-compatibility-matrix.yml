name: Integration Compatibility Matrix

on:
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Manual trigger
  pull_request:
    paths:
      - 'tenuo-python/tenuo/openai.py'
      - 'tenuo-python/tenuo/crewai.py'
      - 'tenuo-python/tenuo/autogen.py'
      - 'tenuo-python/tenuo/langchain.py'
      - 'tenuo-python/tenuo/langgraph.py'
      - 'tenuo-python/tenuo/temporal/**'
      - 'tenuo-python/tenuo/temporal_plugin.py'
      - 'tenuo-python/pyproject.toml'

permissions:
  contents: read
  issues: write

jobs:
  test-compatibility:
    name: ${{ matrix.integration }} @ ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        integration:
          - openai
          - crewai
          - autogen
          - langchain
          - langgraph
        version:
          - minimum  # Minimum supported version
          - latest   # Latest stable
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "tenuo-python[dev]"

      - name: Install minimum version
        if: matrix.version == 'minimum'
        run: |
          # Test the actual minimum versions from pyproject.toml
          # These may have known issues - smoke tests should handle gracefully
          case "${{ matrix.integration }}" in
            openai)
              # Minimum from pyproject.toml - may have httpx issues
              pip install "openai==1.0.0" || pip install "openai==1.6.0"
              ;;
            crewai)
              # Minimum from pyproject.toml
              pip install "crewai==1.0.0" || pip install "crewai==1.1.0"
              ;;
            autogen)
              pip install "autogen-agentchat==0.7.0" "autogen-ext[openai]==0.7.0"
              ;;
            langchain)
              pip install "langchain-core==0.2.0"
              ;;
            langgraph)
              # langgraph 0.2.0 requires langchain-core>=0.2.27
              pip install "langgraph==0.2.0" "langchain-core==0.2.27"
              ;;
          esac

      - name: Install latest version
        if: matrix.version == 'latest'
        run: |
          pip install "tenuo[${{ matrix.integration }}]"

      - name: Show installed versions
        run: |
          pip list | grep -E "(openai|crewai|autogen|langchain|langgraph)"

      - name: Run smoke tests (API contracts)
        run: |
          pytest tenuo-python/tests/e2e/test_smoke.py \
            -k "test_${{ matrix.integration }}" \
            -v --tb=short

      - name: Run integration tests
        run: |
          # Run integration-specific tests if they exist
          pytest tenuo-python/tests/ \
            -k "${{ matrix.integration }}" \
            --ignore=tenuo-python/tests/e2e/ \
            -v --tb=short || echo "No integration tests found"

      - name: Check for deprecation warnings
        run: |
          pytest tenuo-python/tests/e2e/test_smoke.py \
            -k "test_${{ matrix.integration }}" \
            -W error::DeprecationWarning \
            -W error::PendingDeprecationWarning \
            --tb=short || echo "::warning::Deprecation warnings detected in ${{ matrix.integration }}"

      - name: Report compatibility failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `[Integration] ${{ matrix.integration }} ${{ matrix.version }} compatibility issue`;
            const body = `
            ## Integration Test Failure

            **Integration**: ${{ matrix.integration }}
            **Version**: ${{ matrix.version }}
            **Python**: ${{ matrix.python-version }}
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Action Items
            - [ ] Review test logs
            - [ ] Check for breaking changes in upstream changelog
            - [ ] Update integration code if needed
            - [ ] Update minimum version in pyproject.toml if needed
            - [ ] Update compatibility matrix documentation

            ### Upstream Resources
            ${{ matrix.integration == 'openai' && '- [OpenAI Changelog](https://github.com/openai/openai-python/releases)' || '' }}
            ${{ matrix.integration == 'crewai' && '- [CrewAI Changelog](https://github.com/joaomdmoura/crewAI/releases)' || '' }}
            ${{ matrix.integration == 'autogen' && '- [AutoGen Changelog](https://github.com/microsoft/autogen/releases)' || '' }}
            ${{ matrix.integration == 'langchain' && '- [LangChain Changelog](https://python.langchain.com/changelog)' || '' }}
            ${{ matrix.integration == 'langgraph' && '- [LangGraph Changelog](https://github.com/langchain-ai/langgraph/releases)' || '' }}
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['integration', 'breaking-change', '${{ matrix.integration }}', 'automated']
            });

  # ==========================================================================
  # Temporal — needs Rust toolchain + test server, so runs as a separate job.
  # Tests both minimum (1.23.0, where SimplePlugin was introduced) and latest.
  # Replay safety: records workflow history on one version, replays on both.
  # ==========================================================================
  temporal-compatibility:
    name: temporal @ ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        version:
          - minimum
          - latest
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tenuo-python

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: tenuo-python/pyproject.toml

      - name: Cache Temporal test server
        uses: actions/cache@v5
        with:
          path: ~/.cache/temporalio
          key: temporal-test-server-${{ runner.os }}

      - name: Build and install Tenuo
        working-directory: tenuo-python
        run: |
          pip install uv
          uv pip install --system maturin
          maturin build
          uv pip install --system target/wheels/*.whl
          uv pip install --system pytest pytest-asyncio pytest-timeout

      - name: Install temporalio (minimum)
        if: matrix.version == 'minimum'
        run: |
          uv pip install --system "temporalio==1.23.0" "protobuf>=6.0"

      - name: Install temporalio (latest)
        if: matrix.version == 'latest'
        run: |
          uv pip install --system "temporalio" "protobuf>=6.0"

      - name: Show installed versions
        run: |
          pip list | grep -E "(temporalio|tenuo|protobuf|grpcio)"

      - name: Run Temporal adapter tests (unit + replay safety)
        working-directory: tenuo-python
        run: |
          pytest tests/adapters/test_temporal.py \
                 tests/adapters/test_temporal_replay_safety.py \
                 tests/adapters/test_temporal_plugin.py \
                 tests/adapters/test_temporal_integration.py \
                 tests/adapters/test_temporal_delegation.py \
                 tests/adapters/test_transparent_interceptor.py \
                 -v --tb=short -m "not temporal_live"

      - name: Run Temporal live + replay tests
        working-directory: tenuo-python
        timeout-minutes: 10
        env:
          TEMPORAL_LIVE_TESTS: "1"
        run: |
          pytest tests/e2e/test_temporal_live.py \
                 tests/e2e/test_temporal_replay.py \
                 -v -m temporal_live --timeout=300

      - name: Check for deprecation warnings
        working-directory: tenuo-python
        run: |
          pytest tests/adapters/test_temporal.py \
                 tests/adapters/test_temporal_replay_safety.py \
                 -W error::DeprecationWarning \
                 -W error::PendingDeprecationWarning \
                 --tb=short -m "not temporal_live" \
            || echo "::warning::Deprecation warnings detected in temporal @ ${{ matrix.version }}"

      - name: Report compatibility failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `[Integration] temporal ${{ matrix.version }} compatibility issue`;
            const body = `
            ## Temporal Integration Test Failure

            **Version track**: ${{ matrix.version }}
            **Python**: ${{ matrix.python-version }}
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Action Items
            - [ ] Review test logs
            - [ ] Check for breaking changes in [temporalio releases](https://github.com/temporalio/sdk-python/releases)
            - [ ] Verify replay safety across SDK versions
            - [ ] Update minimum version in pyproject.toml if needed
            - [ ] Update compatibility matrix documentation
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['integration', 'breaking-change', 'temporal', 'automated']
            });
